server:
  port: 8091
  servlet:
    context-path: /api

spring:
  application:
    name: kmrl-document-management

  datasource:
    url: jdbc:mysql://localhost:3306/kmrl_project
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: Amaronki123qwe@

  jpa:
    hibernate:
      ddl-auto: update   # Dev me update, prod me validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect

  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB

  http:
    client:
      connect-timeout: 30s
      read-timeout: 60s

task:
  execution:
    pool:
      core-size: 2
      max-size: 5
      queue-capacity: 100
    thread-name-prefix: ai-processing-

# JWT Configuration
app:
  jwtSecret: ${JWT_SECRET:mySecretKey123456789mySecretKey123456789}
  jwtExpirationInMs: 86400000
  base-url: ${BASE_URL:http://localhost:8080}

  # Local File Storage Configuration
  file-storage:
    base-path: ./uploads
    max-file-size: 104857600 # 100MB in bytes
    allowed-extensions: pdf,doc,docx,txt,jpg,jpeg,png,gif,xls,xlsx

# AI/ML Service Configuration
ai:
  ml:
    service:
      url: https://metrixsync-ai-1.onrender.com
      endpoint: /process-document

# ML Service Configuration (Mock Mode)
ml:
  service:
    url: https://metrixsync-ai-1.onrender.com/process-documents
    api-key: ${ML_API_KEY:your-ml-api-key}
    mock-mode: true

# Email Service (Mock Mode)
mail:
  debug-mode: true

# Logging Configuration
logging:
  level:
    com.example.KochiRailMetroProject.KochiRailMetro: DEBUG
    com.example.KochiRailMetroProject.KochiRailMetro.Service.AIDocumentService: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: DEBUG
    root: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
  file:
    name: logs/kmrl-document-management.log

