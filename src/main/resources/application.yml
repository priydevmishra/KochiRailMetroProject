server:
  port: 8080
  servlet:
    context-path: /api

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/kmrl_project?useSSL=false&serverTimezone=UTC
    username: root
    password: Amaronki123qwe@
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update   # options: create, create-drop, update, validate, none
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.MySQL8Dialect

  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB

task:
  execution:
    pool:
      core-size: 5
      max-size: 10
      queue-capacity: 100

# JWT Configuration
app:
  jwtSecret: ${JWT_SECRET:mySecretKey123456789mySecretKey123456789}
  jwtExpirationInMs: 86400000 # 24 hours

# Google Cloud Configuration
google:
  cloud:
    project-id: kmrl-rail-project-sih
    credentials:
      location: classpath:kmrl-rail-project-sih-6548f231730d.json
    storage:
      bucket: kmrl-doc
      base-url: https://storage.googleapis.com
  gmail:
    credentials:
      file: classpath:gmail-credientials.json

# ML Service Configuration
ml:
  service:
    url: ${ML_SERVICE_URL:http://localhost:5000}
    api-key: ${ML_API_KEY:your-ml-api-key}

# Logging Configuration
logging:
  level:
    com.kmrl.docmanagement: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
  file:
    path: logs/
    name: kmrl-document-management.log


  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: amanmishra389123@gmail.com
    password: ${MAIL_PASSWORD:your-mail-password}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
    from: ${MAIL_FROM:noreply@kmrl.com}

# Base URL
base-url: ${BASE_URL:http://localhost:8080}
