server:
  port: 8091
  servlet:
    context-path: /

spring:
  application:
    name: kmrl-document-management
  datasource:
    url: jdbc:mysql://localhost:3306/kmrl
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: Amaronki123qwe@
  jpa:
    hibernate:
      ddl-auto: update   # Dev = update, Prod = validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB
  http:
    client:
      connect-timeout: 30s
      read-timeout: 60s

task:
  execution:
    pool:
      core-size: 2
      max-size: 5
      queue-capacity: 100
    thread-name-prefix: ai-processing-

# JWT Configuration
app:
  jwtSecret: ${JWT_SECRET:mySecretKey123456789mySecretKey123456789}
  jwtExpirationInMs: 86400000
  base-url: ${BASE_URL:http://localhost:8091}  # Updated to match OAuth2 base URL
  mail:
    from: metrixsync454@gmail.com
    base-url: http://localhost:8091
  file-storage:
    base-path: ./uploads
    max-file-size: 104857600   # 100MB in bytes
    allowed-extensions: pdf,doc,docx,txt,jpg,jpeg,png,gif,xls,xlsx

# AI/ML Service Configuration
ai:
  ml:
    service:
      url: https://metrixsync-ai-1.onrender.com
      endpoint: /process-document

ml:
  service:
    url: https://metrixsync-ai-1.onrender.com/process-documents
    api-key: ${ML_API_KEY:my-ml-api-key}
    mock-mode: true

# Logging Configuration
logging:
  level:
    com.example.KochiRailMetroProject.KochiRailMetro: DEBUG
    com.example.KochiRailMetroProject.KochiRailMetro.Service.AIDocumentService: INFO
    org.hibernate.SQL: DEBUG
    org.springframework.security: DEBUG
    org.springframework.security.oauth2.client: DEBUG
    org.springframework.web.client.RestTemplate: DEBUG
    root: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
  file:
    name: logs/kmrl-document-management.log

# Gmail Configuration
google:
  gmail:
    credentials:
      file: "C:/Users/PRIYD/Desktop/KochiRail/KochiRailMetro/credentials/gmail-credentials.json"
    user:
      email: "metrixsync454@gmail.com"

mail:
  debug-mode: true
  host: smtp.gmail.com
  port: 587
  username: metrixsync454@gmail.com
  password: slckphyqlresrgss
  protocol: smtp
  properties:
    mail:
      smtp:
        auth: true
        starttls:
          enable: true
        connectiontimeout: 5000
        timeout: 5000
        writetimeout: 5000
  test-connection: true

# Spring Security OAuth2 Client Configuration
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: $(my_client_id}
            client-secret: ${my_client_Secret}
            scope:
              - openid
              - profile
              - email
              - https://www.googleapis.com/auth/gmail.readonly
            redirect-uri: "http://localhost:8091/api/v1/login/oauth2/code/google"
        provider:
          google:
            authorization-uri: https://accounts.google.com/o/oauth2/auth
            token-uri: https://oauth2.googleapis.com/token
            user-info-uri: https://www.googleapis.com/oauth2/v3/userinfo
            jwk-set-uri: https://www.googleapis.com/oauth2/v3/certs
            user-name-attribute: sub

main:
  allow-circular-references: true

# Cloudinary Configuration
cloudinary:
  cloud-name: dyy9gjfpi
  api-key: ${my_cloudinary_api_key}
  api-secret: ${My_Cloudinary_Secret}
