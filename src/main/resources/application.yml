server:
  port: 8080
  servlet:
    context-path: /api

spring:
  datasource:
    url: jdbc:h2:mem:kmrl_documents   # in-memory DB
    driver-class-name: org.h2.Driver
    username: priydev
    password: priydev@123
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  h2:
    console:
      enabled: true
      path: /h2-console

servlet:
  multipart:
    max-file-size: 100MB
    max-request-size: 100MB

task:
  execution:
    pool:
      core-size: 5
      max-size: 10
      queue-capacity: 100

# JWT Configuration
app:
  jwtSecret: ${JWT_SECRET:mySecretKey123456789mySecretKey123456789}
  jwtExpirationInMs: 86400000 # 24 hours

# Google Cloud Configuration
google:
  cloud:
    project-id: kmrl-rail-project-sih
    credentials:
      location: kmrl-rail-project-sih-6548f231730d.json
    storage:
      bucket: kmrl-doc
      base-url: https://storage.googleapis.com
  gmail:
    credentials:
      file: src/main/resources/gmail-credientials.json

# ML Service Configuration
ml:
  service:
    url: ${ML_SERVICE_URL:http://localhost:5000}
    api-key: ${ML_API_KEY:your-ml-api-key}

# Logging Configuration
logging:
  level:
    com.kmrl.docmanagement: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
  file:
    name: logs/kmrl-document-management.log

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:your-email@gmail.com}
    password: ${MAIL_PASSWORD:your-app-password}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
    from: ${MAIL_FROM:noreply@kmrl.com}

  base-url: ${BASE_URL:http://localhost:8080}
